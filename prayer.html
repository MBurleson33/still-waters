<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Still Waters — Prayer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sand:      #F5F0E8;
  --linen:     #EDE7D9;
  --stone:     #C8BBA8;
  --clay:      #A89880;
  --bark:      #6B5D4F;
  --deep:      #3D322A;
  --water:     #7BA7B8;
  --water-lt:  #B8D4DE;
  --water-dk:  #4A7A8F;
  --water-xs:  #E8F2F6;
  --sage:      #8FA68A;
  --sage-lt:   #C8D9C5;
  --sage-xs:   #EEF4ED;
  --cream:     #FAF7F2;
  --white:     #FFFFFF;
}

html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--sand);
  color: var(--deep);
  min-height: 100vh;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── NAV ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(250,247,242,0.92);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(200,187,168,0.35);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
.nav-right { display: flex; align-items: center; gap: 12px; }
.nav-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--water-lt);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px; color: var(--water-dk);
  cursor: pointer; border: 2px solid transparent;
  transition: border-color 0.2s; overflow: hidden;
}
.nav-avatar:hover { border-color: var(--water); }
.nav-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

/* ── PAGE LAYOUT ── */
.page { padding-top: 56px; min-height: 100vh; }
.columns {
  display: block;
  max-width: 1280px;
  margin: 0 auto;
  padding: 20px 20px 80px;
}
.main-col { width: 100%; }
.side-col { display: none; }

@media (min-width: 700px) {
  .columns {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 32px;
    padding: 32px 40px 48px;
  }
  .main-col { flex: 1; min-width: 0; }
  .side-col {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 280px;
    flex-shrink: 0;
    position: sticky;
    top: 72px;
  }
}

@media (min-width: 900px) {
  nav { height: 68px; padding: 0 48px; }
  nav img { height: 36px !important; }
  .side-col { width: 300px; gap: 20px; }
  .prayer-body { font-size: 16px; }
  .prayer-author { font-size: 15px; }
  .selah-btn { font-size: 15px; padding: 6px 18px; }
  .pray-btn { font-size: 14px; }
  .comment-btn { font-size: 14px; }
}

/* ── PAGE HEADER ── */
.page-header { margin-bottom: 16px; padding: 0 2px; }
.page-header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
.page-header-rule { width: 28px; height: 2px; background: var(--sage); border-radius: 2px; }
.page-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 400; color: var(--deep); }
.page-title em { font-style: italic; color: var(--sage); }
.page-sub { font-size: 13px; font-weight: 300; color: var(--clay); padding-left: 40px; }

/* ── SUMMARY CARD ── */
.summary-card {
  background: var(--deep); border-radius: 16px;
  padding: 20px 22px; margin-bottom: 16px;
  display: flex; align-items: center;
  position: relative; overflow: hidden;
}
.summary-card::before {
  content: ''; position: absolute; top: -40px; right: -20px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(143,166,138,0.15) 0%, transparent 65%);
}
.summary-stat {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px; position: relative;
}
.summary-stat + .summary-stat::before {
  content: ''; position: absolute; left: 0; top: 15%; height: 70%;
  width: 1px; background: rgba(255,255,255,0.08);
}
.summary-value { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: var(--cream); line-height: 1; }
.summary-value.sage { color: var(--sage-lt); }
.summary-label { font-size: 10px; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase; color: var(--stone); }

/* ── FILTER TABS ── */
.filter-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-tab {
  padding: 7px 16px; border-radius: 20px;
  border: 1.5px solid var(--linen); background: none;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  color: var(--clay); cursor: pointer; transition: all 0.18s;
}
.filter-tab:hover { border-color: var(--stone); color: var(--bark); }
.filter-tab.active { border-color: var(--sage); color: #4a6b46; background: var(--sage-xs); }

/* ── LOADING ── */
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 48px 0; gap: 10px; font-size: 14px; color: var(--clay);
}
.spinner {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid var(--linen); border-top-color: var(--sage);
  animation: spin 0.8s linear infinite;
}

/* ── PRAYER CARD ── */
.prayer-card {
  background: var(--white); border-radius: 16px;
  padding: 20px 22px 0;
  box-shadow: 0 1px 3px rgba(61,50,42,0.04);
  margin-bottom: 12px;
  border-left: 3px solid rgba(143,166,138,0.45);
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.prayer-card:hover { box-shadow: 0 2px 12px rgba(61,50,42,0.07); }
.prayer-card.answered { border-left-color: var(--water); opacity: 0.75; }

.prayer-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.prayer-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--water-lt);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif; font-size: 15px;
  color: var(--water-dk); flex-shrink: 0; overflow: hidden;
}
.prayer-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.prayer-author { font-size: 14px; font-weight: 500; color: var(--deep); }
.prayer-time { font-size: 11px; color: var(--stone); margin-top: 1px; }
.answered-badge {
  margin-left: auto; font-size: 10px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--water-dk); background: var(--water-xs);
  padding: 3px 9px; border-radius: 20px;
}
.praying-badge {
  margin-left: auto; font-size: 11px; font-weight: 400;
  color: #4a6b46; display: flex; align-items: center; gap: 4px;
}
.praying-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--sage);
  animation: fadeIn 1s ease infinite alternate;
}

.prayer-body { font-size: 15px; font-weight: 300; line-height: 1.75; color: var(--bark); margin-bottom: 16px; }

.prayer-actions {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 0; border-top: 1px solid var(--linen);
}
.selah-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 14px; border-radius: 20px;
  border: 1.5px solid var(--linen); background: none;
  font-family: 'Cormorant Garamond', serif; font-size: 14px;
  color: var(--clay); cursor: pointer; transition: all 0.18s;
}
.selah-btn:hover { border-color: var(--water); color: var(--water-dk); background: var(--water-xs); }
.selah-btn.active { border-color: var(--water); color: var(--water-dk); background: var(--water-xs); }
.selah-count { font-family: 'DM Sans', sans-serif; font-size: 12px; }

.pray-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 14px; border-radius: 20px;
  border: 1.5px solid var(--linen); background: none;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  color: var(--clay); cursor: pointer; transition: all 0.18s;
}
.pray-btn:hover { border-color: var(--sage); color: #4a6b46; background: var(--sage-xs); }
.pray-btn.active { border-color: var(--sage); color: #4a6b46; background: var(--sage-xs); }
.pray-btn svg { width: 13px; height: 13px; }

.comment-btn {
  font-size: 13px; color: var(--clay); background: none;
  border: none; cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-weight: 300; padding: 5px 2px; transition: color 0.18s;
  margin-left: auto;
}
.comment-btn:hover { color: var(--bark); }

/* ── WRITTEN PRAYER RESPONSE ── */
.prayer-response {
  display: none; border-top: 1px solid var(--linen);
  padding: 14px 0 16px;
}
.prayer-response.visible { display: block; }
.prayer-response-label {
  font-size: 11px; font-weight: 500; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--sage); margin-bottom: 10px;
}
.prayer-textarea {
  width: 100%; border: 1.5px solid var(--linen); border-radius: 10px;
  padding: 12px 14px;
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 15px; color: var(--bark); line-height: 1.65;
  background: var(--cream); resize: none; outline: none;
  transition: border-color 0.2s; min-height: 80px;
}
.prayer-textarea:focus { border-color: var(--sage); }
.prayer-textarea::placeholder { color: var(--stone); }
.prayer-response-actions {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 10px; margin-top: 10px;
}
.prayer-cancel {
  font-size: 13px; color: var(--clay); background: none;
  border: none; cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: color 0.2s;
}
.prayer-cancel:hover { color: var(--bark); }
.prayer-submit {
  padding: 7px 18px; border-radius: 20px; background: var(--sage);
  border: none; font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500; color: white;
  cursor: pointer; transition: background 0.2s;
}
.prayer-submit:hover { background: #6a8f65; }
.prayer-submit:disabled { opacity: 0.6; cursor: not-allowed; }

/* ── WRITTEN PRAYERS LIST ── */
.prayers-list { border-top: 1px solid var(--linen); padding: 14px 0 16px; }
.prayers-list-label {
  font-size: 10px; font-weight: 500; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--stone); margin-bottom: 12px;
}
.prayer-response-item { display: flex; gap: 10px; margin-bottom: 12px; }
.prayer-response-item:last-child { margin-bottom: 0; }
.response-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--linen);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif; font-size: 12px;
  color: var(--bark); flex-shrink: 0; margin-top: 2px;
  overflow: hidden;
}
.response-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.response-bubble { background: var(--cream); border-radius: 0 10px 10px 10px; padding: 9px 12px; flex: 1; }
.response-name { font-size: 11px; font-weight: 500; color: var(--bark); margin-bottom: 3px; }
.response-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 14px; color: var(--bark); line-height: 1.55; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 48px 0;
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-style: italic;
  color: var(--clay); line-height: 1.6;
}
.empty-state span { display: block; font-family: 'DM Sans', sans-serif; font-style: normal; font-size: 14px; margin-top: 8px; color: var(--stone); }

/* ── SIDEBAR CARDS ── */
.sb-card { background: var(--white); border-radius: 16px; padding: 18px 20px; box-shadow: 0 1px 3px rgba(61,50,42,0.04); }
.sb-scripture { background: var(--deep); border-radius: 16px; padding: 20px 22px; position: relative; overflow: hidden; }
.sb-scripture::before { content: ''; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; background: radial-gradient(circle,rgba(123,167,184,0.18) 0%,transparent 65%); pointer-events: none; }
.sb-scripture-label { font-size: 10px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--water); margin-bottom: 10px; }
.sb-scripture-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 15px; font-weight: 300; color: var(--cream); line-height: 1.55; margin-bottom: 8px; }
.sb-scripture-ref { font-size: 11px; color: var(--water); }
.sb-nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 10px; font-size: 14px; color: var(--bark); text-decoration: none; transition: background 0.18s; }
.sb-nav-item:hover { background: var(--linen); }
.sb-nav-item.active { color: var(--water-dk); background: var(--water-xs); font-weight: 500; }
.sb-nav-item svg { width: 17px; height: 17px; flex-shrink: 0; }
.sb-verse { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 12px; color: var(--stone); text-align: center; padding: 0 8px; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(250,247,242,0.95); backdrop-filter: blur(14px);
  border-top: 1px solid rgba(200,187,168,0.35);
  display: flex; align-items: center; justify-content: space-around;
  padding: 10px 0 max(10px, env(safe-area-inset-bottom)); z-index: 100;
}
.bottom-nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; color: var(--stone); transition: color 0.2s; padding: 0 20px; }
.bottom-nav-btn.active { color: var(--water-dk); }
.bottom-nav-btn svg { width: 22px; height: 22px; }
.bottom-nav-label { font-size: 10px; font-weight: 400; letter-spacing: 0.05em; }

@media (min-width: 700px) {
  .bottom-nav { display: none; }
  .page { padding-bottom: 0; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/feed" class="nav-logo">
    <img src="/logos/Still Waters Logo - Horizontal Color.png" alt="Still Waters" style="height: 26px; width: auto;" />
  </a>
  <div class="nav-right">
    <div class="nav-avatar" id="navAvatar" onclick="window.location.href='/profile'">M</div>

<div class="page">
  <div class="columns">

    <!-- MAIN COLUMN -->
    <div class="main-col">

      <!-- PAGE HEADER -->
      <div class="page-header">
        <div class="page-header-top">
          <div class="page-header-rule"></div>
          <div class="page-title">Prayer <em>requests</em></div>

        <div class="page-sub">From your community · Chronological</div>
      </div>

      <!-- SUMMARY -->
      <div class="summary-card">

          <div class="summary-value" id="statOpen">—</div>

      <div class="sb-card">
        <div style="display:flex;flex-direction:column;gap:4px;">
          <a href="/feed" class="sb-nav-item">
            <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 9.5L11 3l8 6.5V19a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/></svg>
            Feed
          </a>
          <a href="/prayer" class="sb-nav-item active">
            <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M11 2C11 2 5 8 5 12.5C5 15.985 7.686 18.8 11 18.8C14.314 18.8 17 15.985 17 12.5C17 8 11 2 11 2Z"/></svg>
            Prayer
          </a>
          <a href="/profile" class="sb-nav-item">

            Profile
          </a>

      <div class="sb-verse">"Be still, and know that I am God."<br>— Psalm 46:10</div>
    </div>

  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="bottom-nav-btn" onclick="window.location.href='/feed'">
    <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 9.5L11 3l8 6.5V19a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/></svg>
    <span class="bottom-nav-label">Feed</span>
  </button>
  <button class="bottom-nav-btn active">

    <span class="bottom-nav-label">Profile</span>

<script>
const SUPABASE_URL = 'https://olhpiqxxofcwlkpvimug.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9saHBpcXh4b2Zjd2xrcHZpbXVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzgxMzgsImV4cCI6MjA5MDE1NDEzOH0.7t8CE_VxXzHCEpLIFOiwRFbgsWQWRQ42QxlESgE1tGQ';

let currentUser = null;
let allPosts = [];
let currentFilter = 'all';

function getToken() {
  const sbKey = Object.keys(localStorage).find(k => k.startsWith('sb-') && k.endsWith('-auth-token'));
  if (sbKey) {
    try {
      const session = JSON.parse(localStorage.getItem(sbKey));
      if (session?.access_token) return session.access_token;
    } catch {}
  }
  for (const key of Object.keys(localStorage)) {
    try {
      const val = localStorage.getItem(key);
      if (!val || !val.startsWith('{')) continue;
      const parsed = JSON.parse(val);
      if (parsed?.access_token && parsed.access_token.startsWith('eyJ')) return parsed.access_token;
    } catch {}
  }
  for (const key of Object.keys(localStorage)) {
    const val = localStorage.getItem(key);
    if (val && val.startsWith('eyJ') && !val.includes(' ')) return val;
  }
  return null;
}

async function init() {
  const token = getToken();
  if (!token) { window.location.href = '/auth'; return; }

  const userRes = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${token}` }
  });
  if (!userRes.ok) { window.location.href = '/auth'; return; }
  currentUser = await userRes.json();

  // Update nav avatar
  const profileRes = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${currentUser.id}&select=full_name,avatar_url`, {
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${token}`, 'Accept-Profile': 'stillwaters' }
  });
  if (profileRes.ok) {
    const profiles = await profileRes.json();
    const profile = profiles[0] || {};
    const navAvatar = document.getElementById('navAvatar');
    if (profile.avatar_url) {
      navAvatar.innerHTML = `<img src="${profile.avatar_url}" alt="avatar" />`;
    } else {
      const name = profile.full_name || currentUser.email || 'U';
      navAvatar.textContent = name[0].toUpperCase();
    }
  }

  await loadPrayers();
}

async function loadPrayers() {
  const token = getToken();
  const feed = document.getElementById('prayerFeed');

  // Fetch all prayer posts with profiles, selahs, and written prayers
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/posts?type=eq.prayer&select=*,profile:profiles(full_name,avatar_url,username),selahs(user_id),prayers(id,body,user_id,profile:profiles(full_name,avatar_url))&order=created_at.desc&limit=50`,
    {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${token}`,
        'Accept-Profile': 'stillwaters'
      }
    }
  );

  if (!res.ok) {
    feed.innerHTML = `<div class="empty-state">Could not load prayer requests.<span>Please try refreshing.</span></div>`;
    return;
  }

  allPosts = await res.json();
  updateSummary();
  renderPrayers();
}

function updateSummary() {
  const open = allPosts.filter(p => !p.answered).length;
  const answered = allPosts.filter(p => p.answered).length;
  const praying = allPosts.filter(p => p.selahs && p.selahs.some(s => s.user_id === currentUser.id)).length;
  document.getElementById('statOpen').textContent = open;
  document.getElementById('statAnswered').textContent = answered;
  document.getElementById('statPraying').textContent = praying;
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderPrayers();
}

function renderPrayers() {
  const feed = document.getElementById('prayerFeed');
  let posts = allPosts;

  if (currentFilter === 'praying') {
    posts = allPosts.filter(p => p.selahs && p.selahs.some(s => s.user_id === currentUser.id));
  } else if (currentFilter === 'answered') {
    posts = allPosts.filter(p => p.answered);
  }

  if (!posts.length) {
    const messages = {
      all: 'No prayer requests yet.<span>Be the first to share one from the feed.</span>',
      praying: 'You haven\'t Selah\'d any prayer requests yet.<span>Tap ✦ Selah on a request to start praying.</span>',
      answered: 'No answered prayers yet.<span>Keep praying — God hears.</span>'
    };
    feed.innerHTML = `<div class="empty-state">${messages[currentFilter]}</div>`;
    return;
  }

  feed.innerHTML = posts.map(post => {
    const profile = post.profile || {};
    const name = profile.full_name || 'Someone';
    const initial = name[0].toUpperCase();
    const avatarUrl = profile.avatar_url;
    const timeAgo = getTimeAgo(post.created_at);
    const selahCount = post.selahs ? post.selahs.length : 0;
    const hasSelahed = post.selahs ? post.selahs.some(s => s.user_id === currentUser.id) : false;
    const writtenPrayers = post.prayers || [];

    const avatarHtml = avatarUrl
      ? `<div class="prayer-avatar"><img src="${avatarUrl}" alt="${name}" /></div>`
      : `<div class="prayer-avatar">${initial}</div>`;

    const badgeHtml = post.answered
      ? `<div class="answered-badge">✓ Answered</div>`
      : `<div class="praying-badge"><div class="praying-dot"></div>${selahCount} praying</div>`;

    const writtenPrayersHtml = writtenPrayers.length ? `
      <div class="prayers-list">
        <div class="prayers-list-label">Prayers written · ${writtenPrayers.length}</div>
        ${writtenPrayers.map(p => {
          const pProfile = p.profile || {};
          const pName = pProfile.full_name || 'Someone';
          const pInitial = pName[0].toUpperCase();
          const pAvatar = pProfile.avatar_url
            ? `<div class="response-avatar"><img src="${pProfile.avatar_url}" alt="${pName}" /></div>`
            : `<div class="response-avatar">${pInitial}</div>`;
          return `
            <div class="prayer-response-item">
              ${pAvatar}
              <div class="response-bubble">
                <div class="response-name">${pName}</div>
                <div class="response-text">${p.body}</div>
              </div>
            </div>`;
        }).join('')}
      </div>` : '';

    const prayBtnLabel = hasSelahed ? 'Praying' : 'Pray';

    return `
      <div class="prayer-card ${post.answered ? 'answered' : ''}" id="card-${post.id}">
        <div class="prayer-meta">
          ${avatarHtml}
          <div>
            <div class="prayer-author">${name}</div>
            <div class="prayer-time">${timeAgo}</div>
          </div>
          ${badgeHtml}
        </div>
        <div class="prayer-body">${post.body}</div>
        <div class="prayer-actions">
          <button class="selah-btn ${hasSelahed ? 'active' : ''}" onclick="toggleSelah(this, '${post.id}')">
            <span>✦</span><span>Selah</span><span class="selah-count">· ${selahCount}</span>
          </button>
          ${!post.answered ? `<button class="pray-btn ${hasSelahed ? 'active' : ''}" onclick="togglePray(this, '${post.id}')">
            <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6.5 1C6.5 1 3 4.5 3 6.8C3 8.567 4.567 10 6.5 10C8.433 10 10 8.567 10 6.8C10 4.5 6.5 1 6.5 1Z"/></svg>
            ${prayBtnLabel}
          </button>` : ''}
          <button class="comment-btn" onclick="toggleWritePrayer(this, '${post.id}')">Write a prayer</button>
        </div>
        <div class="prayer-response" id="response-${post.id}">
          <div class="prayer-response-label">Pray for ${name.split(' ')[0]}</div>
          <textarea class="prayer-textarea" id="textarea-${post.id}" placeholder="Lord, I lift ${name.split(' ')[0]} up to you…" rows="3"></textarea>
          <div class="prayer-response-actions">
            <button class="prayer-cancel" onclick="toggleWritePrayer(document.querySelector('#card-${post.id} .comment-btn'), '${post.id}')">Cancel</button>
            <button class="prayer-submit" onclick="submitPrayer('${post.id}')">Send prayer</button>
          </div>
        </div>
        ${writtenPrayersHtml}
      </div>`;
  }).join('');
}

function getTimeAgo(dateStr) {
  const seconds = Math.floor((new Date() - new Date(dateStr)) / 1000);
  if (seconds < 60) return 'Just now';
  if (seconds < 3600) return Math.floor(seconds/60) + 'm ago';
  if (seconds < 86400) return Math.floor(seconds/3600) + 'h ago';
  if (seconds < 604800) return Math.floor(seconds/86400) + 'd ago';
  return new Date(dateStr).toLocaleDateString();
}

async function toggleSelah(btn, postId) {
  const token = getToken();
  const countEl = btn.querySelector('.selah-count');
  const current = parseInt(countEl.textContent.replace(/\D/g,''));
  const isActive = btn.classList.contains('active');
  btn.classList.toggle('active');
  countEl.textContent = '· ' + (isActive ? current - 1 : current + 1);

  // Update local data
  const post = allPosts.find(p => p.id === postId);
  if (post) {
    if (isActive) {
      post.selahs = (post.selahs || []).filter(s => s.user_id !== currentUser.id);
    } else {
      post.selahs = [...(post.selahs || []), { user_id: currentUser.id }];
    }
    updateSummary();
  }

  if (isActive) {
    await fetch(`${SUPABASE_URL}/rest/v1/selahs?user_id=eq.${currentUser.id}&post_id=eq.${postId}`, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${token}`, 'Content-Profile': 'stillwaters' }
    });
  } else {
    await fetch(`${SUPABASE_URL}/rest/v1/selahs`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Content-Profile': 'stillwaters', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ user_id: currentUser.id, post_id: postId })
    });
  }
}

function togglePray(btn, postId) {
  // Pray button mirrors Selah for now — both track via selahs table
  const selahBtn = btn.closest('.prayer-actions').querySelector('.selah-btn');
  toggleSelah(selahBtn, postId);
  btn.classList.toggle('active');
  const textNode = [...btn.childNodes].find(n => n.nodeType === 3 || (n.nodeType === 1 && n.tagName !== 'SVG'));
  if (btn.classList.contains('active')) {
    btn.lastChild.textContent = ' Praying';
  } else {
    btn.lastChild.textContent = ' Pray';
  }
}

function toggleWritePrayer(commentBtn, postId) {
  const responseBox = document.getElementById('response-' + postId);
  const isVisible = responseBox.classList.contains('visible');
  responseBox.classList.toggle('visible', !isVisible);
  if (!isVisible) document.getElementById('textarea-' + postId).focus();
}

async function submitPrayer(postId) {
  const token = getToken();
  const textarea = document.getElementById('textarea-' + postId);
  const body = textarea.value.trim();
  if (!body) return;

  const submitBtn = textarea.closest('.prayer-response').querySelector('.prayer-submit');
  submitBtn.textContent = 'Sending…';
  submitBtn.disabled = true;

  const res = await fetch(`${SUPABASE_URL}/rest/v1/prayers`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json',
      'Content-Profile': 'stillwaters',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify({ user_id: currentUser.id, post_id: postId, body })
  });

  if (res.ok) {
    textarea.value = '';
    document.getElementById('response-' + postId).classList.remove('visible');
    submitBtn.textContent = 'Send prayer';
    submitBtn.disabled = false;
    // Reload to show new prayer
    await loadPrayers();
  } else {
    submitBtn.textContent = 'Send prayer';
    submitBtn.disabled = false;
    alert('Something went wrong. Please try again.');
  }
}

init();
</script>
