<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Still Waters — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sand: #F5F0E8; --linen: #EDE7D9; --stone: #C8BBA8;
  --clay: #A89880; --bark: #6B5D4F; --deep: #3D322A;
  --water: #7BA7B8; --water-dk: #4A7A8F; --water-lt: #B8D4DE;
  --water-xs: #EBF4F7; --cream: #FAF7F2; --white: #FFFFFF;
  --sage: #8FA68A; --sage-xs: #EEF3ED;
}
body { font-family: 'DM Sans', sans-serif; background: var(--sand); color: var(--deep); min-height: 100vh; }

nav {
  background: rgba(250,247,242,0.95); backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(200,187,168,0.35);
  padding: 0 32px; height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.nav-logo { text-decoration: none; }
.nav-right { display: flex; align-items: center; gap: 16px; }
.nav-tag {
  font-size: 11px; font-weight: 500; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--water-dk);
  background: var(--water-xs); border: 1px solid var(--water-lt);
  padding: 4px 10px; border-radius: 20px;
}
.nav-back {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--clay); text-decoration: none;
  transition: color 0.2s;
}
.nav-back:hover { color: var(--bark); }
.nav-back svg { width: 16px; height: 16px; }

.container { max-width: 1000px; margin: 0 auto; padding: 40px 24px 80px; }

.page-header { margin-bottom: 40px; }
.page-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--water-dk); margin-bottom: 10px; }
.page-title { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 400; color: var(--deep); line-height: 1.1; }
.page-title em { font-style: italic; color: var(--water-dk); }
.page-updated { font-size: 12px; color: var(--stone); margin-top: 8px; }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 40px; }
@media (min-width: 600px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }

.stat-card {
  background: var(--white); border-radius: 16px; padding: 24px 20px;
  box-shadow: 0 1px 3px rgba(61,50,42,0.06);
}
.stat-card-value {
  font-family: 'Cormorant Garamond', serif; font-size: 42px;
  font-weight: 400; color: var(--deep); line-height: 1; margin-bottom: 6px;
}
.stat-card-value.water { color: var(--water-dk); }
.stat-card-value.sage { color: var(--sage); }
.stat-card-value.bark { color: var(--bark); }
.stat-card-label { font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--clay); }
.stat-card-sub { font-size: 12px; color: var(--stone); margin-top: 4px; }

/* Section */
.section { margin-bottom: 40px; }
.section-title {
  font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400;
  color: var(--deep); margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 1px solid var(--linen); display: flex; align-items: center; gap: 10px;
}
.section-title em { font-style: italic; color: var(--water-dk); }

/* User table */
.user-table { width: 100%; border-collapse: collapse; }
.user-table th {
  text-align: left; padding: 10px 14px; background: var(--linen);
  font-size: 11px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--clay);
}
.user-table th:first-child { border-radius: 8px 0 0 0; }
.user-table th:last-child { border-radius: 0 8px 0 0; }
.user-table td { padding: 12px 14px; border-bottom: 1px solid var(--linen); font-size: 13px; color: var(--bark); vertical-align: middle; }
.user-table tr:last-child td { border-bottom: none; }
.user-table tr:hover td { background: var(--cream); }
.user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--water-lt); display: inline-flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif; font-size: 14px; color: var(--water-dk);
  overflow: hidden; vertical-align: middle; margin-right: 8px;
}
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.user-name { font-weight: 500; color: var(--deep); }
.joined-date { font-size: 12px; color: var(--stone); }

/* Activity cards */
.activity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 600px) { .activity-grid { grid-template-columns: 1fr; } }
.activity-card {
  background: var(--white); border-radius: 14px; padding: 20px;
  box-shadow: 0 1px 3px rgba(61,50,42,0.06);
}
.activity-card-title { font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--clay); margin-bottom: 14px; }
.activity-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--linen); font-size: 13px; }
.activity-item:last-child { border-bottom: none; }
.activity-item-label { color: var(--bark); }
.activity-item-value { font-weight: 500; color: var(--deep); }

/* Loading */
.loading { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 48px; color: var(--clay); font-size: 14px; }
.spinner { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--linen); border-top-color: var(--water); animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.4s ease; }

.error-state { text-align: center; padding: 48px; color: var(--clay); }
.error-state h2 { font-family: 'Cormorant Garamond', serif; font-size: 24px; margin-bottom: 8px; color: var(--deep); }
</style>
</head>

<script>

const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9saHBpcXh4b2Zjd2xrcHZpbXVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzgxMzgsImV4cCI6MjA5MDE1NDEzOH0.7t8CE_VxXzHCEpLIFOiwRFbgsWQWRQ42QxlESgE1tGQ';
const ADMIN_USER_ID = ''; // Will be set after auth check

function getToken() {
  const sbKey = Object.keys(localStorage).find(k => k.startsWith('sb-') && k.endsWith('-auth-token'));
  if (sbKey) { try { const s = JSON.parse(localStorage.getItem(sbKey)); if (s?.access_token) return s.access_token; } catch {} }
  return null;
}

function timeAgo(date) {
  const diff = (Date.now() - new Date(date)) / 1000;
  if (diff < 60) return 'Just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
  return new Date(date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatDate(date) {
  return new Date(date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

async function init() {
  const token = getToken();
  if (!token) { window.location.href = '/auth'; return; }

  // Clear stale session if ?reset in URL
  if (window.location.search.includes('reset')) {
    sessionStorage.removeItem('sw-admin-pw');
  }

  // Always show password gate first
  const savedPw = sessionStorage.getItem('sw-admin-pw');
  if (!savedPw) {
    showPasswordGate();
    return;
  }

  // Verify saved password
  const valid = await verifyPassword(savedPw);
  if (!valid) {
    sessionStorage.removeItem('sw-admin-pw');
    showPasswordGate();
    return;
  }

  const userRes = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${token}` }
  });
  if (!userRes.ok) { window.location.href = '/auth'; return; }
  const user = await userRes.json();

  loadDashboard(token, user);
}

function showPasswordGate() {
  document.getElementById('container').innerHTML = `
    <div style="max-width:360px;margin:80px auto;text-align:center;">
      <div style="font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;color:var(--deep);margin-bottom:8px;">Admin <em style="font-style:italic;color:var(--water-dk);">access</em></div>
      <div style="font-size:14px;color:var(--clay);margin-bottom:32px;">Enter your admin password to continue.</div>
      <input id="pw-input" type="password" placeholder="Password"
        style="width:100%;padding:12px 16px;border:1.5px solid var(--linen);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--deep);background:var(--white);outline:none;margin-bottom:12px;display:block;"
        onkeydown="if(event.key==='Enter')checkPassword()" />
      <button onclick="checkPassword()"
        style="width:100%;padding:12px;background:var(--water-dk);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:white;cursor:pointer;">
        Enter
      </button>
      <div id="pw-error" style="font-size:13px;color:#c0392b;margin-top:10px;display:none;">Incorrect password.</div>
    </div>
  `;
  setTimeout(() => document.getElementById('pw-input')?.focus(), 100);
}

async function checkPassword() {
  const pw = document.getElementById('pw-input').value.trim();
  if (!pw) return;
  const valid = await verifyPassword(pw);
  if (valid) {
    sessionStorage.setItem('sw-admin-pw', pw);
    document.getElementById('container').innerHTML = '<div class="loading"><div class="spinner"></div>Loading dashboard…</div>';
    const token = getToken();
    const userRes = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${token}` }
    });
    const user = await userRes.json();
    loadDashboard(token, user);
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

async function verifyPassword(pw) {
  try {
    console.log('Verifying password...');
    const res = await fetch('/api/admin-auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    console.log('Auth response:', res.status);
    return res.ok;
  } catch(e) { 
    console.error('Auth error:', e);
    return false; 
  }
}

async function loadDashboard(token, user) {
  try {
  // Load all data in parallel
  const headers = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${token}`, 'Accept-Profile': 'stillwaters' };

  const fetchSafe = async (url, opts) => {
    try {
      const res = await fetch(url, opts);
      if (!res.ok) { console.warn('Fetch failed:', url, res.status); return []; }
      return await res.json();
    } catch(e) { console.warn('Fetch error:', url, e); return []; }
  };

  const [users, posts, prayers, selahs, comments, prays, follows, pushSubs] = await Promise.all([
    fetchSafe(`${SUPABASE_URL}/rest/v1/profiles?select=id,full_name,username,avatar_url,created_at,onboarded&order=created_at.desc`, { headers }),
    fetchSafe(`${SUPABASE_URL}/rest/v1/posts?select=id,type,created_at,answered,user_id&order=created_at.desc`, { headers }),
    fetchSafe(`${SUPABASE_URL}/rest/v1/prayers?select=id,created_at`, { headers }),
    fetchSafe(`${SUPABASE_URL}/rest/v1/selahs?select=id,created_at`, { headers }),
    fetchSafe(`${SUPABASE_URL}/rest/v1/comments?select=id,created_at`, { headers }),
    fetchSafe(`${SUPABASE_URL}/rest/v1/prays?select=id,created_at`, { headers }),
    fetchSafe(`${SUPABASE_URL}/rest/v1/follows?select=id,created_at`, { headers }),
    fetchSafe(`${SUPABASE_URL}/rest/v1/push_subscriptions?select=id,user_id`, { headers }),
  ]);

  const prayerPosts = posts.filter(p => p.type === 'prayer');
  const thoughtPosts = posts.filter(p => p.type === 'thought');
  const scripturePosts = posts.filter(p => p.type === 'scripture');
  const answeredPrayers = prayerPosts.filter(p => p.answered);

  // Last 7 days
  const week = new Date(Date.now() - 7 * 86400000);
  const newUsersWeek = users.filter(u => new Date(u.created_at) > week).length;
  const newPostsWeek = posts.filter(p => new Date(p.created_at) > week).length;

  const updatedAt = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

  document.getElementById('container').innerHTML = `
    <div class="fade-in">
      <div class="page-header">
        <div class="page-eyebrow">Still Waters</div>
        <div class="page-title">Admin <em>dashboard</em></div>
        <div class="page-updated">Updated at ${updatedAt} · Logged in as ${user.email}</div>
      </div>

      <!-- Top stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-value">${users.length}</div>
          <div class="stat-card-label">Total users</div>
          <div class="stat-card-sub">+${newUsersWeek} this week</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value water">${posts.length}</div>
          <div class="stat-card-label">Total posts</div>
          <div class="stat-card-sub">+${newPostsWeek} this week</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value sage">${prayerPosts.length}</div>
          <div class="stat-card-label">Prayer requests</div>
          <div class="stat-card-sub">${answeredPrayers.length} answered</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value bark">${selahs.length + prays.length}</div>
          <div class="stat-card-label">Selahs + Prays</div>
          <div class="stat-card-sub">${selahs.length} selahs · ${prays.length} prays</div>
        </div>
      </div>

      <!-- Activity breakdown -->
      <div class="section">
        <div class="section-title">Community <em>activity</em></div>
        <div class="activity-grid">
          <div class="activity-card">
            <div class="activity-card-title">Content breakdown</div>
            <div class="activity-item"><span class="activity-item-label">Thoughts</span><span class="activity-item-value">${thoughtPosts.length}</span></div>
            <div class="activity-item"><span class="activity-item-label">Prayer requests</span><span class="activity-item-value">${prayerPosts.length}</span></div>
            <div class="activity-item"><span class="activity-item-label">Scripture posts</span><span class="activity-item-value">${scripturePosts.length}</span></div>
            <div class="activity-item"><span class="activity-item-label">Written prayers</span><span class="activity-item-value">${prayers.length}</span></div>
            <div class="activity-item"><span class="activity-item-label">Comments</span><span class="activity-item-value">${comments.length}</span></div>
          </div>
          <div class="activity-card">
            <div class="activity-card-title">Engagement</div>
            <div class="activity-item"><span class="activity-item-label">Selahs given</span><span class="activity-item-value">${selahs.length}</span></div>
            <div class="activity-item"><span class="activity-item-label">Prayers given</span><span class="activity-item-value">${prays.length}</span></div>
            <div class="activity-item"><span class="activity-item-label">Follows</span><span class="activity-item-value">${follows.length}</span></div>
            <div class="activity-item"><span class="activity-item-label">Answered prayers</span><span class="activity-item-value">${answeredPrayers.length}</span></div>
            <div class="activity-item"><span class="activity-item-label">Push subscriptions</span><span class="activity-item-value">${pushSubs.length}</span></div>
          </div>
        </div>
      </div>

      <!-- Users table -->
      <div class="section">
        <div class="section-title">All <em>members</em> <span style="font-size:14px;color:var(--clay);font-family:'DM Sans',sans-serif;font-style:normal;">(${users.length})</span></div>
        <div style="overflow-x:auto;border-radius:12px;box-shadow:0 1px 3px rgba(61,50,42,0.06);">
          <table class="user-table">
            <thead>
              <tr>
                <th>Member</th>
                <th>Username</th>
                <th>Posts</th>
                <th>Onboarded</th>
                <th>Joined</th>
              </tr>
            </thead>
            <tbody>
              ${users.map(u => {
                const name = u.full_name || 'Unknown';
                const initial = name[0].toUpperCase();
                const userPosts = posts.filter(p => p.user_id === u.id).length;

          </table>
        </div>
      </div>

    </div>
  `;
  } catch(err) {
    console.error('Dashboard error:', err);
    document.getElementById('container').innerHTML = `

init();
